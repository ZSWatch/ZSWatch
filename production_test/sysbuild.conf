# Minimal sysbuild config — no MCUboot, no netcore child images.
# Local dev builds produce a plain hex flashable directly (app links at 0x0).
#
# For CI/factory builds that produce an MCUboot-compatible signed image:
#   west build ... -- -DPM_STATIC_YML_FILE=".../pm_static_watchdk_nrf5340_cpuapp_1_mcuboot.yml"
# This links the image at 0x10200. Then sign with imgtool and merge with MCUboot hex.
