# Test mode overlay for AI agent and CI testing.
# Usage:
#   west build ... -- -DEXTRA_CONF_FILE="boards/test_mode.conf"
#
# To auto-launch a specific app at boot, add:
#   -DCONFIG_ZSW_TEST_AUTO_LAUNCH_APP=\"Calculator\"

CONFIG_ZSW_TEST_MODE=y
CONFIG_ZSW_TEST_SKIP_ONBOARDING=y

# Enable interactive shell on stdin/stdout (native_sim)
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_ASSERT_VERBOSE=y

# Enable info-level logs for key modules during testing
CONFIG_ZSW_UI_CONTROLLER_LOG_LEVEL_INF=y
CONFIG_ZSW_APP_LOG_LEVEL_INF=y
